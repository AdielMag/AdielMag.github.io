<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="Segoe UI, system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <style>
      text { fill: #e6edf3; }
      .ttl  { font-size: 21px; font-weight: 700; }
      .sub  { font-size: 12.5px; fill: #8b98a5; }
      .t    { font-size: 14px; font-weight: 600; }
      .s    { font-size: 11px; fill: #8b98a5; }
      .mono { font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
    </style>
  </defs>

  <rect width="940" height="480" fill="#0f1419"/>
  <text x="40" y="44" class="ttl">The fake dip: one thin order vs. the real book</text>
  <text x="40" y="68" class="sub">Before a stop-loss fires, the bot audits the orderbook — a price with no depth behind it is an opinion.</text>

  <!-- orderbook panel -->
  <rect x="40" y="96" width="430" height="330" rx="12" fill="#131a22" stroke="#20344a"/>
  <text x="64" y="126" class="t">CLOB orderbook — NO token</text>

  <!-- price ladder labels -->
  <text x="64" y="164" class="mono" fill="#8b98a5" font-size="11">price</text>
  <text x="150" y="164" class="mono" fill="#8b98a5" font-size="11">resting size</text>

  <!-- fake thin ask -->
  <text x="64" y="196" class="mono" fill="#ff7b72">0.45</text>
  <rect x="150" y="184" width="14" height="14" rx="3" fill="#f85149" opacity="0.85"/>
  <text x="174" y="196" class="mono" fill="#ff7b72" font-size="11">← attacker's $2 sell order — now "the price"</text>

  <!-- gap -->
  <text x="64" y="236" class="mono" fill="#8b98a5" opacity="0.5">0.60</text>
  <text x="150" y="236" class="mono" fill="#8b98a5" font-size="11" opacity="0.5">(empty — nobody actually here)</text>

  <!-- real bids -->
  <text x="64" y="286" class="mono" fill="#56c96a">0.97</text>
  <rect x="150" y="274" width="240" height="14" rx="3" fill="#3fb950" opacity="0.85"/>
  <text x="64" y="316" class="mono" fill="#56c96a">0.96</text>
  <rect x="150" y="304" width="200" height="14" rx="3" fill="#3fb950" opacity="0.7"/>
  <text x="64" y="346" class="mono" fill="#56c96a">0.95</text>
  <rect x="150" y="334" width="160" height="14" rx="3" fill="#3fb950" opacity="0.55"/>
  <text x="150" y="376" class="mono" fill="#56c96a" font-size="11">real bids — never moved</text>

  <text x="64" y="410" class="mono" fill="#8b98a5" font-size="11">quoted price crashed 0.99 → 0.45, best bid still 0.97</text>

  <!-- arrow to check -->
  <line x1="470" y1="260" x2="520" y2="260" stroke="#4da3ff" stroke-width="2"/>
  <path d="M520,254 L532,260 L520,266 Z" fill="#4da3ff"/>

  <!-- depth check card -->
  <rect x="536" y="120" width="370" height="150" rx="12" fill="#15212e" stroke="#4da3ff" stroke-width="2"/>
  <text x="556" y="150" class="t" fill="#79c0ff">Pre-flight check before selling</text>
  <text x="556" y="178" class="s">1. Sum bids within 10¢ of the quoted price —</text>
  <text x="572" y="194" class="mono" fill="#79c0ff" font-size="11">under $15 of real depth? drop is synthetic.</text>
  <text x="556" y="222" class="s">2. Where's the best bid? Still above the stop</text>
  <text x="572" y="238" class="mono" fill="#79c0ff" font-size="11">threshold → the "crash" came from a thin ask.</text>
  <text x="556" y="260" class="s">API down? Fail open — a missing stop-loss is worse.</text>

  <!-- outcomes -->
  <rect x="536" y="292" width="370" height="62" rx="10" fill="#16231a" stroke="#3fb950"/>
  <text x="556" y="318" class="t" fill="#56c96a">Fake dip → skip this tick</text>
  <text x="556" y="338" class="s">re-check next tick; the attacker's bait costs them time</text>

  <rect x="536" y="366" width="370" height="62" rx="10" fill="#231616" stroke="#f85149"/>
  <text x="556" y="392" class="t" fill="#ff7b72">Real collapse → stop-loss fires</text>
  <text x="556" y="412" class="s">bids genuinely fell with depth behind them — cut fast</text>
</svg>
