<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="Segoe UI, system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <style>
      text { fill: #e6edf3; }
      .ttl  { font-size: 21px; font-weight: 700; }
      .sub  { font-size: 12.5px; fill: #8b98a5; }
      .t    { font-size: 14px; font-weight: 600; }
      .s    { font-size: 11px; fill: #8b98a5; }
      .mono { font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
    </style>
  </defs>

  <rect width="940" height="480" fill="#0f1419"/>
  <text x="40" y="44" class="ttl">The final 30 seconds: the token lies, the asset doesn't</text>
  <text x="40" y="68" class="sub">Two independent tripwires watch the close — divergence detection and a kill switch for pennies-vs-dollars risk.</text>

  <!-- chart frame -->
  <rect x="40" y="96" width="620" height="300" rx="12" fill="#131a22" stroke="#20344a"/>

  <!-- time axis -->
  <line x1="70" y1="356" x2="630" y2="356" stroke="#2b3947"/>
  <text x="70"  y="376" class="mono" fill="#8b98a5" font-size="11">-30s</text>
  <text x="300" y="376" class="mono" fill="#8b98a5" font-size="11">-20s</text>
  <text x="480" y="376" class="mono" fill="#8b98a5" font-size="11">-10s</text>
  <text x="600" y="376" class="mono" fill="#8b98a5" font-size="11">close</text>

  <!-- time-vegas zone: last 20s -->
  <rect x="310" y="110" width="320" height="246" fill="rgba(248,81,73,0.07)"/>
  <line x1="310" y1="110" x2="310" y2="356" stroke="#f85149" stroke-dasharray="4 4" opacity="0.6"/>
  <text x="322" y="128" class="mono" fill="#f85149" font-size="11">Time-Vegas zone: &lt; 20s left</text>

  <!-- BTC line: flat/slightly rising, calm -->
  <path d="M70,190 L150,187 L230,189 L310,184 L390,183 L470,180 L550,178 L630,176"
        fill="none" stroke="#ffd23f" stroke-width="2.5"/>
  <text x="76" y="178" class="mono" fill="#ffd23f" font-size="11">BTC spot — flat, comfortably above strike</text>

  <!-- token line: high then predatory dive -->
  <path d="M70,150 L150,148 L230,146 L310,148 L370,147 L410,168 L440,214 L470,258 L520,262 L560,244 L630,140"
        fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="76" y="140" class="mono" fill="#a78bfa" font-size="11">YES token — 97¢, high conviction</text>

  <!-- PDD annotation -->
  <circle cx="440" cy="214" r="5" fill="#f85149"/>
  <line x1="440" y1="214" x2="440" y2="300" stroke="#f85149" stroke-dasharray="3 3" opacity="0.7"/>
  <text x="452" y="298" class="mono" fill="#f85149" font-size="11">PDD: token −3¢+/tick,</text>
  <text x="452" y="313" class="mono" fill="#f85149" font-size="11">BTC didn't move</text>

  <!-- snap back note -->
  <text x="574" y="166" class="s" fill="#56c96a">…snaps back</text>

  <!-- tripwire cards -->
  <rect x="690" y="110" width="216" height="128" rx="10" fill="#1a212b" stroke="#f85149"/>
  <text x="706" y="136" class="t" fill="#ff7b72">Tripwire 1 — PDD</text>
  <text x="706" y="158" class="s">Token dives while the asset is</text>
  <text x="706" y="173" class="s">flat or rising. Only arms in the</text>
  <text x="706" y="188" class="s">last 30s, below 88¢, after a</text>
  <text x="706" y="203" class="s">peak above 93¢.</text>
  <text x="706" y="226" class="mono" fill="#ff7b72" font-size="11">divergence = predator</text>

  <rect x="690" y="256" width="216" height="128" rx="10" fill="#1a212b" stroke="#ffd23f"/>
  <text x="706" y="282" class="t" fill="#ffd23f">Tripwire 2 — Time-Vegas</text>
  <text x="706" y="304" class="s">&lt; 20s remaining and still under</text>
  <text x="706" y="319" class="s">98.5¢? Exit. Risking ~98¢ to</text>
  <text x="706" y="334" class="s">earn ~2¢ at the most</text>
  <text x="706" y="349" class="s">manipulable moment.</text>
  <text x="706" y="372" class="mono" fill="#ffd23f" font-size="11">leave the table</text>

  <!-- verdict strip -->
  <rect x="40" y="416" width="866" height="40" rx="10" fill="#16231a" stroke="#3fb950"/>
  <text x="60" y="441" class="mono" fill="#56c96a" font-size="12">Grid search, 2,592 combos on real trades: catches 9/13 losses (+$17.14), 8/150 false alarms (−$3.48) → net +$13.66</text>
</svg>
