<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Segoe UI, system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="dcPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a371f7"/></marker>
    <marker id="dcBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4da3ff"/></marker>
    <marker id="dcRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#f85149"/></marker>
    <style>
      text { fill: #e6edf3; }
      .ttl  { font-size: 21px; font-weight: 700; }
      .sub  { font-size: 12.5px; fill: #8b98a5; }
      .t    { font-size: 15px; font-weight: 600; }
      .s    { font-size: 11.5px; fill: #8b98a5; }
      .lbl  { font-size: 12px; fill: #c9d4df; font-weight: 600; }
      .mono { font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
    </style>
  </defs>

  <rect width="900" height="460" fill="#0f1419"/>
  <text x="40" y="46" class="ttl">The client is deliberately dumb</text>
  <text x="40" y="70" class="sub">It renders and sends inputs. It decides nothing. The server owns the entire game.</text>

  <!-- Phone / client -->
  <rect x="60" y="130" width="230" height="230" rx="18" fill="#1a212b" stroke="#a371f7" stroke-width="1.5"/>
  <text x="175" y="166" class="t" text-anchor="middle" fill="#c4b1ee">📱 The phone</text>
  <line x1="86" y1="182" x2="264" y2="182" stroke="#33294a"/>
  <text x="175" y="210" class="lbl" text-anchor="middle">Reads your thumb</text>
  <text x="175" y="234" class="lbl" text-anchor="middle">Draws the world</text>
  <text x="175" y="258" class="lbl" text-anchor="middle">Predicts your own move</text>
  <text x="175" y="300" class="s" text-anchor="middle">No rules. No scores. No hit</text>
  <text x="175" y="316" class="s" text-anchor="middle">detection. No source of truth.</text>
  <text x="175" y="344" class="mono" text-anchor="middle" fill="#c4b1ee">zero game logic</text>

  <!-- Server -->
  <rect x="610" y="130" width="230" height="230" rx="18" fill="#15212e" stroke="#4da3ff" stroke-width="1.5"/>
  <text x="725" y="166" class="t" text-anchor="middle" fill="#79c0ff">☁ The server</text>
  <line x1="636" y1="182" x2="814" y2="182" stroke="#20344a"/>
  <text x="725" y="210" class="lbl" text-anchor="middle">Runs the one true</text>
  <text x="725" y="234" class="lbl" text-anchor="middle">simulation</text>
  <text x="725" y="262" class="lbl" text-anchor="middle">Owns movement, hits,</text>
  <text x="725" y="280" class="lbl" text-anchor="middle">scores, win / lose</text>
  <text x="725" y="322" class="s" text-anchor="middle">the single source of truth —</text>
  <text x="725" y="338" class="s" text-anchor="middle">everyone renders what it says</text>

  <!-- arrows -->
  <path d="M292,220 L606,220" stroke="#a371f7" stroke-width="2" fill="none" marker-end="url(#dcPurple)"/>
  <text x="449" y="208" class="lbl" text-anchor="middle" fill="#c4b1ee">inputs — "what I pressed"</text>

  <path d="M606,272 L294,272" stroke="#4da3ff" stroke-width="2" fill="none" marker-end="url(#dcBlue)"/>
  <text x="449" y="292" class="lbl" text-anchor="middle" fill="#79c0ff">snapshots — "what is actually true"</text>

  <!-- cheater blocked -->
  <text x="175" y="404" class="s" text-anchor="middle" fill="#f0857c">✕ a hacked client can lie about inputs…</text>
  <text x="725" y="404" class="s" text-anchor="middle" fill="#56c96a">…but can't change what the server decides ✓</text>

  <text x="40" y="440" class="s">The rule: if it decides an outcome, it lives on the server — never on the phone.</text>
</svg>
