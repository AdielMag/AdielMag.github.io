<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="aBlue"   markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4da3ff"/></marker>
    <marker id="aGreen"  markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/></marker>
    <marker id="aAmber"  markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#d29922"/></marker>
    <marker id="aPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a371f7"/></marker>
    <style>
      text { fill: #e6edf3; }
      .ttl  { font-size: 21px; font-weight: 700; }
      .sub  { font-size: 12.5px; fill: #8b98a5; }
      .hdr  { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
      .t    { font-size: 14.5px; font-weight: 600; }
      .s    { font-size: 11px; fill: #8b98a5; }
      .lbl  { font-size: 11px; fill: #c9d4df; }
      .chip { font-size: 11.5px; }
    </style>
  </defs>

  <rect width="960" height="640" fill="#0f1419"/>
  <text x="40" y="44" class="ttl">Who owns what</text>
  <text x="40" y="68" class="sub">A serverless controller is the only thing always reachable. It turns the rest of the fleet on and off.</text>

  <!-- ===== Unity client ===== -->
  <rect x="34" y="270" width="180" height="120" rx="12" fill="#1a212b" stroke="#a371f7"/>
  <text x="124" y="308" class="t" text-anchor="middle">🎮 Unity Client</text>
  <text x="124" y="332" class="s" text-anchor="middle">at boot, asks:</text>
  <text x="124" y="350" class="lbl" text-anchor="middle">"where do I connect?"</text>
  <text x="124" y="374" class="s" text-anchor="middle">then plays on the fleet</text>

  <!-- ===== GCP boundary ===== -->
  <rect x="250" y="86" width="680" height="518" rx="14" fill="#0d141c" stroke="#4da3ff" stroke-dasharray="6 5" stroke-opacity="0.5"/>
  <text x="270" y="112" class="hdr" fill="#4da3ff">☁  GOOGLE CLOUD</text>

  <!-- ===== Cloud Scheduler ===== -->
  <rect x="300" y="128" width="210" height="72" rx="10" fill="#16202b" stroke="#d29922"/>
  <text x="405" y="158" class="t" text-anchor="middle" fill="#e3b341">⏰ Cloud Scheduler</text>
  <text x="405" y="180" class="s" text-anchor="middle">pings the idle check every 30 min</text>

  <!-- ===== Fleet Controller (brain) ===== -->
  <rect x="300" y="256" width="210" height="128" rx="12" fill="#15212e" stroke="#4da3ff" stroke-width="2"/>
  <text x="405" y="288" class="t" text-anchor="middle" fill="#79c0ff">🧠 Fleet Controller</text>
  <text x="405" y="309" class="s" text-anchor="middle">Cloud Run · scales to zero</text>
  <line x1="322" y1="322" x2="488" y2="322" stroke="#20344a"/>
  <text x="405" y="344" class="lbl" text-anchor="middle">decides: sleep · wake</text>
  <text x="405" y="364" class="lbl" text-anchor="middle">answers: where to connect</text>

  <!-- ===== Services MIG ===== -->
  <rect x="676" y="128" width="216" height="96" rx="10" fill="#16202b" stroke="#4da3ff"/>
  <text x="784" y="158" class="t" text-anchor="middle">Services fleet</text>
  <text x="784" y="180" class="s" text-anchor="middle">lobby · matchmaking</text>
  <text x="784" y="202" class="s" text-anchor="middle">instances: 0 ⇆ N</text>

  <!-- ===== GameServer MIG ===== -->
  <rect x="676" y="256" width="216" height="96" rx="10" fill="#16231a" stroke="#3fb950"/>
  <text x="784" y="286" class="t" text-anchor="middle" fill="#56c96a">GameServer fleet</text>
  <text x="784" y="308" class="s" text-anchor="middle">authoritative 30 Hz matches</text>
  <text x="784" y="330" class="s" text-anchor="middle">instances: 0 ⇆ N</text>

  <!-- ===== Idle-billing networking ===== -->
  <rect x="300" y="426" width="360" height="150" rx="12" fill="#191a12" stroke="#d29922" stroke-dasharray="7 5"/>
  <text x="320" y="452" class="hdr" fill="#d29922">IDLE-BILLING NETWORKING</text>
  <text x="320" y="470" class="s">created on wake · deleted on sleep</text>
  <rect x="320" y="484" width="150" height="34" rx="7" fill="#231f12" stroke="#7a5c1e"/>
  <text x="395" y="506" class="chip" text-anchor="middle">Entry point (LB)</text>
  <rect x="486" y="484" width="150" height="34" rx="7" fill="#231f12" stroke="#7a5c1e"/>
  <text x="561" y="506" class="chip" text-anchor="middle">Static IPs</text>
  <rect x="320" y="528" width="316" height="34" rx="7" fill="#231f12" stroke="#7a5c1e"/>
  <text x="478" y="550" class="chip" text-anchor="middle">Cloud NAT — egress to the database</text>

  <!-- ===== MongoDB Atlas ===== -->
  <g transform="translate(720,440)">
    <ellipse cx="65" cy="12" rx="65" ry="14" fill="#16271a" stroke="#3fb950"/>
    <path d="M0,12 L0,96 A65,14 0 0 0 130,96 L130,12" fill="#16271a" stroke="#3fb950"/>
    <ellipse cx="65" cy="12" rx="65" ry="14" fill="#16271a" stroke="#3fb950"/>
    <text x="65" y="52" class="t" text-anchor="middle" fill="#56c96a">MongoDB</text>
    <text x="65" y="72" class="s" text-anchor="middle">Atlas · IP allowlist</text>
  </g>

  <!-- ===== arrows ===== -->
  <!-- client -> controller (resolve) -->
  <path d="M214,318 C 250,308 268,300 296,300" stroke="#a371f7" stroke-width="2" fill="none" marker-end="url(#aPurple)"/>
  <text x="196" y="252" class="lbl" fill="#c4b1ee">① ask the controller</text>
  <text x="196" y="268" class="s">(public, always reachable)</text>

  <!-- scheduler -> controller -->
  <path d="M405,200 L405,254" stroke="#d29922" stroke-width="1.8" fill="none" marker-end="url(#aAmber)"/>
  <text x="416" y="230" class="s" fill="#e3b341">idle tick</text>

  <!-- controller -> services (control) -->
  <path d="M510,286 C 590,260 600,190 674,180" stroke="#4da3ff" stroke-width="1.8" fill="none" marker-end="url(#aBlue)"/>
  <!-- controller -> gameserver (control) -->
  <path d="M510,312 C 585,308 600,304 674,304" stroke="#4da3ff" stroke-width="1.8" fill="none" marker-end="url(#aBlue)"/>
  <text x="556" y="248" class="s" fill="#79c0ff">② turn instances</text>
  <text x="556" y="263" class="s" fill="#79c0ff">on / off</text>

  <!-- controller -> networking (create/delete) -->
  <path d="M405,384 L405,422" stroke="#d29922" stroke-width="1.8" fill="none" marker-end="url(#aAmber)"/>
  <text x="416" y="410" class="s" fill="#e3b341">③ build / tear down</text>

  <!-- networking -> atlas (egress) & controller re-allowlist -->
  <path d="M636,545 C 680,545 690,520 714,510" stroke="#3fb950" stroke-width="1.8" fill="none" marker-end="url(#aGreen)"/>
  <text x="648" y="576" class="s" fill="#56c96a">only path to the DB</text>
  <path d="M510,352 C 640,392 700,420 760,436" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#aGreen)"/>
  <text x="590" y="410" class="s" fill="#56c96a">re-allowlist egress IP on wake</text>

  <!-- client -> fleet gameplay -->
  <path d="M150,390 C 150,610 430,600 470,566" stroke="#a371f7" stroke-width="2" stroke-dasharray="6 4" fill="none" marker-end="url(#aPurple)"/>
  <text x="150" y="470" class="lbl" fill="#c4b1ee">④ once awake, play</text>
  <text x="150" y="486" class="s">through the entry point</text>

  <!-- legend -->
  <g transform="translate(40,616)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#a371f7" stroke-width="2"/><text x="38" y="4" class="s">client</text>
    <line x1="110" y1="0" x2="140" y2="0" stroke="#4da3ff" stroke-width="2"/><text x="148" y="4" class="s">control</text>
    <line x1="230" y1="0" x2="260" y2="0" stroke="#d29922" stroke-width="2"/><text x="268" y="4" class="s">lifecycle</text>
    <line x1="360" y1="0" x2="390" y2="0" stroke="#3fb950" stroke-width="2"/><text x="398" y="4" class="s">data / egress</text>
  </g>
</svg>
