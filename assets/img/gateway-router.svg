<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 480" font-family="Segoe UI, system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="gwB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4da3ff"/></marker>
    <marker id="gwP" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#a371f7"/></marker>
    <style>
      text { fill: #e6edf3; }
      .ttl  { font-size: 21px; font-weight: 700; }
      .sub  { font-size: 12.5px; fill: #8b98a5; }
      .t    { font-size: 14px; font-weight: 600; }
      .s    { font-size: 11px; fill: #8b98a5; }
      .mono { font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
      .hdr  { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="940" height="480" fill="#0f1419"/>
  <text x="40" y="44" class="ttl">A game version is a container, not a machine</text>
  <text x="40" y="68" class="sub">One gateway reads each client's build version and routes it to a backend for exactly that version.</text>

  <!-- clients -->
  <g>
    <rect x="34" y="118" width="188" height="52" rx="10" fill="#1a212b" stroke="#a371f7"/>
    <text x="52" y="140" class="t">📱 Player on 1.0.0</text>
    <text x="52" y="158" class="mono" fill="#c4b1ee" font-size="11">x-client-version: 1.0.0</text>

    <rect x="34" y="214" width="188" height="52" rx="10" fill="#1a212b" stroke="#a371f7"/>
    <text x="52" y="236" class="t">📱 Player on 1.0.1</text>
    <text x="52" y="254" class="mono" fill="#c4b1ee" font-size="11">x-client-version: 1.0.1</text>

    <rect x="34" y="310" width="188" height="52" rx="10" fill="#1a212b" stroke="#a371f7"/>
    <text x="52" y="332" class="t">📱 Player on 1.0.2</text>
    <text x="52" y="350" class="mono" fill="#c4b1ee" font-size="11">x-client-version: 1.0.2</text>
  </g>

  <!-- gateway -->
  <rect x="330" y="150" width="220" height="180" rx="14" fill="#15212e" stroke="#4da3ff" stroke-width="2"/>
  <text x="440" y="182" class="t" text-anchor="middle" fill="#79c0ff">🚦 One gateway</text>
  <text x="440" y="204" class="s" text-anchor="middle">reads the version header,</text>
  <text x="440" y="220" class="s" text-anchor="middle">forwards to the right backend,</text>
  <text x="440" y="236" class="s" text-anchor="middle">spawns it on demand if needed</text>
  <line x1="352" y1="252" x2="528" y2="252" stroke="#20344a"/>
  <text x="440" y="274" class="s" text-anchor="middle">the same image runs on every</text>
  <text x="440" y="290" class="s" text-anchor="middle">machine — only config differs</text>
  <text x="440" y="314" class="mono" text-anchor="middle" fill="#79c0ff" font-size="11">no header → “latest”</text>

  <!-- backends -->
  <g>
    <rect x="662" y="118" width="244" height="52" rx="10" fill="#16231a" stroke="#3fb950"/>
    <text x="680" y="140" class="mono" fill="#56c96a">backend :1.0.0</text>
    <text x="680" y="158" class="s">its own container, pulled on demand</text>

    <rect x="662" y="214" width="244" height="52" rx="10" fill="#16231a" stroke="#3fb950"/>
    <text x="680" y="236" class="mono" fill="#56c96a">backend :1.0.1</text>
    <text x="680" y="254" class="s">runs side-by-side with the others</text>

    <rect x="662" y="310" width="244" height="52" rx="10" fill="#16231a" stroke="#3fb950"/>
    <text x="680" y="332" class="mono" fill="#56c96a">backend :1.0.2</text>
    <text x="680" y="350" class="s">newest build, spawned when asked for</text>
  </g>

  <!-- arrows client -> gateway -->
  <path d="M222,144 C 280,150 300,190 328,205" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#gwP)"/>
  <path d="M222,240 L326,240" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#gwP)"/>
  <path d="M222,336 C 280,330 300,290 328,275" stroke="#a371f7" stroke-width="1.8" fill="none" marker-end="url(#gwP)"/>

  <!-- arrows gateway -> backends (version-matched) -->
  <path d="M550,200 C 610,180 620,150 658,144" stroke="#4da3ff" stroke-width="1.8" fill="none" marker-end="url(#gwB)"/>
  <path d="M550,240 L658,240" stroke="#4da3ff" stroke-width="1.8" fill="none" marker-end="url(#gwB)"/>
  <path d="M550,280 C 610,300 620,330 658,336" stroke="#4da3ff" stroke-width="1.8" fill="none" marker-end="url(#gwB)"/>

  <text x="40" y="452" class="s">Every player talks to a backend built from the exact version they’re running — so two builds never have to agree on anything but the wire format.</text>
</svg>
