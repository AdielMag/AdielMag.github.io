<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="Segoe UI, system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="cArrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b98a5"/></marker>
    <style>
      text { fill: #e6edf3; }
      .ttl  { font-size: 21px; font-weight: 700; }
      .sub  { font-size: 12.5px; fill: #8b98a5; }
      .val  { font-size: 24px; font-weight: 700; }
      .cat  { font-size: 14px; font-weight: 600; }
      .note { font-size: 11.5px; fill: #8b98a5; }
      .step { font-size: 12px; fill: #c9d4df; font-weight: 600; }
    </style>
  </defs>

  <rect width="880" height="500" fill="#0f1419"/>
  <text x="40" y="46" class="ttl">Idle cost, one step at a time</text>
  <text x="40" y="70" class="sub">What a matchmade dedicated-server fleet bills each month with zero players online.</text>

  <!-- baseline -->
  <line x1="60" y1="404" x2="820" y2="404" stroke="#2d3744" stroke-width="1.5"/>

  <!-- ==== Bar 1: always-on ~$146 ==== -->
  <rect x="110" y="120" width="150" height="284" rx="6" fill="#f85149" fill-opacity="0.85"/>
  <text x="185" y="108" class="val" text-anchor="middle" fill="#ff9d97">$146</text>
  <text x="185" y="434" class="cat" text-anchor="middle">Naive always-on</text>
  <text x="185" y="454" class="note" text-anchor="middle">2 gateways + LB + IPs +</text>
  <text x="185" y="470" class="note" text-anchor="middle">NAT, running 24/7</text>

  <!-- ==== Bar 2: compute asleep ~$25 ==== -->
  <rect x="380" y="354" width="150" height="50" rx="6" fill="#d29922" fill-opacity="0.9"/>
  <text x="455" y="342" class="val" text-anchor="middle" fill="#e3b341">$25</text>
  <text x="455" y="434" class="cat" text-anchor="middle">Compute asleep</text>
  <text x="455" y="454" class="note" text-anchor="middle">instances scaled to 0, but</text>
  <text x="455" y="470" class="note" text-anchor="middle">networking still bills</text>

  <!-- ==== Bar 3: $0 ==== -->
  <rect x="650" y="396" width="150" height="8" rx="4" fill="#3fb950"/>
  <text x="725" y="384" class="val" text-anchor="middle" fill="#56c96a">$0</text>
  <text x="725" y="434" class="cat" text-anchor="middle">Fully asleep</text>
  <text x="725" y="454" class="note" text-anchor="middle">networking torn down too —</text>
  <text x="725" y="470" class="note" text-anchor="middle">nothing left to bill</text>

  <!-- ==== step annotations ==== -->
  <path d="M264,150 C 310,150 320,330 376,352" stroke="#8b98a5" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#cArrow)"/>
  <text x="322" y="210" class="step" text-anchor="middle">scale compute</text>
  <text x="322" y="226" class="step" text-anchor="middle">to zero</text>
  <text x="322" y="244" class="note" text-anchor="middle">−$121</text>

  <path d="M534,372 C 585,372 600,388 646,396" stroke="#8b98a5" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#cArrow)"/>
  <text x="592" y="330" class="step" text-anchor="middle">release IPs,</text>
  <text x="592" y="346" class="step" text-anchor="middle">LB entry, NAT</text>
  <text x="592" y="364" class="note" text-anchor="middle">−$25</text>
</svg>
