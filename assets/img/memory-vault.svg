<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Segoe UI, system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <style>
      text { fill: #e6edf3; }
      .ttl  { font-size: 21px; font-weight: 700; }
      .sub  { font-size: 12.5px; fill: #8b98a5; }
      .t    { font-size: 13.5px; font-weight: 600; }
      .s    { font-size: 11px; fill: #8b98a5; }
      .mono { font-family: ui-monospace, Consolas, monospace; font-size: 11.5px; fill: #c9d4df; }
      .hdr  { font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="900" height="450" fill="#0f1419"/>
  <text x="40" y="46" class="ttl">One vault, three ways in</text>
  <text x="40" y="70" class="sub">The memory lives in the repo — so it's readable by the AI, browsable by me, and versioned by git.</text>

  <!-- center: the vault -->
  <rect x="330" y="120" width="240" height="230" rx="14" fill="#16231a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="450" y="148" class="t" text-anchor="middle" fill="#56c96a">🗄 docs/  (the vault)</text>
  <line x1="352" y1="160" x2="548" y2="160" stroke="#234a2b"/>
  <text x="352" y="182" class="mono">memory/</text>
  <text x="366" y="202" class="mono">├ architecture/</text>
  <text x="366" y="220" class="mono">├ netcode/</text>
  <text x="366" y="238" class="mono">├ abilities/</text>
  <text x="366" y="256" class="mono">├ gameplay/ · ops/ …</text>
  <text x="366" y="278" class="mono">└ MEMORY.md  <tspan fill="#56c96a">(index)</tspan></text>
  <text x="352" y="308" class="s">rules/ — conventions that</text>
  <text x="352" y="324" class="s">load when I edit matching files</text>

  <!-- left top: AI -->
  <rect x="40" y="120" width="210" height="90" rx="12" fill="#1a212b" stroke="#a371f7"/>
  <text x="145" y="150" class="t" text-anchor="middle" fill="#c4b1ee">🤖 Claude</text>
  <text x="145" y="172" class="s" text-anchor="middle">reads the index, follows</text>
  <text x="145" y="188" class="s" text-anchor="middle">links, writes new notes</text>

  <!-- left bottom: me / obsidian -->
  <rect x="40" y="260" width="210" height="90" rx="12" fill="#16202b" stroke="#4da3ff"/>
  <text x="145" y="290" class="t" text-anchor="middle" fill="#79c0ff">🧑 Me, in Obsidian</text>
  <text x="145" y="312" class="s" text-anchor="middle">browse + edit the same</text>
  <text x="145" y="328" class="s" text-anchor="middle">notes as a linked wiki</text>

  <!-- right: git -->
  <rect x="650" y="190" width="210" height="90" rx="12" fill="#191a12" stroke="#d29922"/>
  <text x="755" y="220" class="t" text-anchor="middle" fill="#e3b341">🌱 Git history</text>
  <text x="755" y="242" class="s" text-anchor="middle">every memory change is a</text>
  <text x="755" y="258" class="s" text-anchor="middle">commit — diffable, revertable</text>

  <!-- connectors -->
  <path d="M250,165 C 290,175 300,200 328,205" stroke="#a371f7" stroke-width="1.8" fill="none"/>
  <path d="M250,305 C 290,290 300,270 328,262" stroke="#4da3ff" stroke-width="1.8" fill="none"/>
  <path d="M570,235 L646,235" stroke="#d29922" stroke-width="1.8" fill="none"/>

  <text x="40" y="410" class="s">Because it's in-repo, a memory the AI writes shows up as a git change I can review — the knowledge base</text>
  <text x="40" y="428" class="s">and the code evolve together, in the same history.</text>
</svg>
