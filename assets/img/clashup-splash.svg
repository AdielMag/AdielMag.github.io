<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1233"/>
      <stop offset="0.5" stop-color="#7a2b57"/>
      <stop offset="0.8" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#ff9a3c"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="46%" r="42%">
      <stop offset="0" stop-color="#fff3c4" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="#ffd23f" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffd23f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#fff3c4"/>
      <stop offset="0.7" stop-color="#ffd23f" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffd23f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arena" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2168"/>
      <stop offset="1" stop-color="#1b1030"/>
    </linearGradient>
    <linearGradient id="hL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a4c"/>
      <stop offset="1" stop-color="#e5344f"/>
    </linearGradient>
    <linearGradient id="hR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cf29c"/>
      <stop offset="1" stop-color="#33b3ff"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="675" fill="url(#sky)"/>
  <circle cx="600" cy="300" r="380" fill="url(#sun)"/>

  <!-- impact rays behind the clash -->
  <g fill="#ffffff" opacity="0.08">
    <polygon points="600,330 470,-30 560,-30"/>
    <polygon points="600,330 640,-30 730,-30"/>
    <polygon points="600,330 1130,150 1180,260"/>
    <polygon points="600,330 70,150 20,260"/>
    <polygon points="600,330 250,560 150,520"/>
    <polygon points="600,330 950,560 1050,520"/>
  </g>

  <!-- floating pixel props -->
  <g opacity="0.9">
    <g transform="translate(150,120) rotate(-12)"><polygon points="20,3 37,12 37,28 20,37 3,28 3,12" fill="#7cf29c"/><polygon points="20,3 37,12 20,20 3,12" fill="#a9f7c2"/><polygon points="20,20 37,12 37,28 20,37" fill="#54c67d"/></g>
    <g transform="translate(1000,110) rotate(10)"><polygon points="12,1 15,9 23,9 16,14 19,22 12,17 5,22 8,14 1,9 9,9" fill="#ffd23f"/></g>
    <g transform="translate(1080,300) rotate(8)"><circle cx="17" cy="17" r="14" fill="#ffd23f"/><circle cx="17" cy="17" r="9" fill="none" stroke="#1b1030" stroke-width="2"/></g>
    <g transform="translate(90,330) rotate(-8)"><path d="M13 22 L4 13 Q0 8 5 4 Q9 1 13 6 Q17 1 21 4 Q26 8 22 13 Z" fill="#ff6b4a"/></g>
  </g>

  <!-- arena platform -->
  <g>
    <ellipse cx="600" cy="560" rx="440" ry="120" fill="url(#arena)"/>
    <ellipse cx="600" cy="560" rx="440" ry="120" fill="none" stroke="#9d7bff" stroke-opacity="0.55" stroke-width="4"/>
    <ellipse cx="600" cy="560" rx="300" ry="80" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>
    <ellipse cx="600" cy="560" rx="160" ry="42" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>
  </g>

  <!-- LEFT brawler -->
  <g transform="translate(410,430)">
    <ellipse cx="0" cy="150" rx="95" ry="24" fill="#000000" opacity="0.28"/>
    <path d="M-70 40 q-30 -30 -10 -70 l40 20 z" fill="url(#hL)" opacity="0.9"/>
    <rect x="-58" y="20" width="116" height="120" rx="46" fill="url(#hL)"/>
    <circle cx="0" cy="-6" r="60" fill="url(#hL)"/>
    <path d="M-52 -14 a52 40 0 0 1 104 0 z" fill="#2a1140" opacity="0.9"/>
    <rect x="-34" y="-24" width="24" height="12" rx="6" fill="#fff3c4"/>
    <rect x="10" y="-24" width="24" height="12" rx="6" fill="#fff3c4"/>
    <circle cx="70" cy="70" r="30" fill="url(#hL)"/>
    <circle cx="70" cy="70" r="30" fill="none" stroke="#2a1140" stroke-width="6" opacity="0.5"/>
  </g>

  <!-- RIGHT brawler -->
  <g transform="translate(790,430)">
    <ellipse cx="0" cy="150" rx="95" ry="24" fill="#000000" opacity="0.28"/>
    <path d="M70 40 q30 -30 10 -70 l-40 20 z" fill="url(#hR)" opacity="0.9"/>
    <rect x="-58" y="20" width="116" height="120" rx="46" fill="url(#hR)"/>
    <circle cx="0" cy="-6" r="60" fill="url(#hR)"/>
    <path d="M-52 -14 a52 40 0 0 1 104 0 z" fill="#0b2b3a" opacity="0.85"/>
    <rect x="-34" y="-24" width="24" height="12" rx="6" fill="#0b2b3a"/>
    <rect x="10" y="-24" width="24" height="12" rx="6" fill="#0b2b3a"/>
    <circle cx="-70" cy="70" r="30" fill="url(#hR)"/>
    <circle cx="-70" cy="70" r="30" fill="none" stroke="#0b2b3a" stroke-width="6" opacity="0.5"/>
  </g>

  <!-- central clash burst -->
  <circle cx="600" cy="470" r="150" fill="url(#burst)"/>
  <g transform="translate(600,470)" fill="#ffffff">
    <polygon points="0,-120 22,-30 0,0 -22,-30" opacity="0.95"/>
    <polygon points="0,120 22,30 0,0 -22,30" opacity="0.95"/>
    <polygon points="-120,0 -30,-22 0,0 -30,22" opacity="0.95"/>
    <polygon points="120,0 30,-22 0,0 30,22" opacity="0.95"/>
    <polygon points="-70,-70 -12,-30 0,0 -30,-12" opacity="0.7"/>
    <polygon points="70,70 12,30 0,0 30,12" opacity="0.7"/>
    <polygon points="70,-70 30,-12 0,0 12,-30" opacity="0.7"/>
    <polygon points="-70,70 -30,12 0,0 -12,30" opacity="0.7"/>
    <circle r="26" fill="#fff3c4"/>
  </g>
  <!-- spark particles -->
  <g fill="#ffd23f">
    <circle cx="470" cy="360" r="6"/><circle cx="740" cy="380" r="7"/>
    <circle cx="520" cy="560" r="5"/><circle cx="690" cy="540" r="6"/>
    <circle cx="600" cy="300" r="5" fill="#ffffff"/>
  </g>

  <!-- COMING SOON pill -->
  <g transform="translate(600,624)">
    <rect x="-96" y="-22" width="192" height="44" rx="22" fill="#151318" opacity="0.55"/>
    <rect x="-96" y="-22" width="192" height="44" rx="22" fill="none" stroke="#ffd23f" stroke-opacity="0.7" stroke-width="2"/>
    <text x="0" y="7" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" letter-spacing="3" fill="#ffd23f">COMING SOON</text>
  </g>

  <!-- edge vignette -->
  <rect width="1200" height="675" fill="url(#sky)" opacity="0"/>
  <rect width="1200" height="675" fill="none"/>
</svg>
