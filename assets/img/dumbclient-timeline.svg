<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, system-ui, -apple-system, Roboto, sans-serif">
  <defs>
    <marker id="tlArrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b98a5"/></marker>
    <style>
      text { fill: #e6edf3; }
      .ttl  { font-size: 21px; font-weight: 700; }
      .sub  { font-size: 12.5px; fill: #8b98a5; }
      .lane { font-size: 13.5px; font-weight: 700; }
      .s    { font-size: 11.5px; fill: #8b98a5; }
      .lbl  { font-size: 12px; fill: #c9d4df; }
      .tag  { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
    </style>
  </defs>

  <rect width="900" height="480" fill="#0f1419"/>
  <text x="40" y="46" class="ttl">See yourself in the present, everyone else in the past</text>
  <text x="40" y="70" class="sub">Three tricks turn a strict server-authoritative model into something that feels instant.</text>

  <!-- NOW line -->
  <line x1="470" y1="96" x2="470" y2="452" stroke="#4da3ff" stroke-dasharray="4 4" stroke-opacity="0.6"/>
  <text x="470" y="112" class="tag" text-anchor="middle" fill="#79c0ff">NOW</text>
  <text x="150" y="112" class="tag" text-anchor="middle" fill="#6f7681">← ~66 ms in the past</text>

  <!-- Lane 1: local player -->
  <rect x="40" y="128" width="820" height="120" rx="12" fill="#1a212b" stroke="#a371f7" stroke-opacity="0.6"/>
  <text x="60" y="154" class="lane" fill="#c4b1ee">🕹 You (the local player)</text>
  <text x="60" y="176" class="s">Prediction: your move happens the instant you touch the screen — no waiting for the round-trip.</text>
  <circle cx="470" cy="212" r="9" fill="#a371f7"/>
  <text x="470" y="240" class="lbl" text-anchor="middle">rendered at NOW</text>
  <path d="M120,212 L455,212" stroke="#a371f7" stroke-width="2" fill="none" marker-end="url(#tlArrow)"/>
  <text x="120" y="205" class="s">tap → predict</text>

  <!-- Lane 2: reconciliation -->
  <rect x="40" y="260" width="820" height="92" rx="12" fill="#16202b" stroke="#4da3ff" stroke-opacity="0.6"/>
  <text x="60" y="286" class="lane" fill="#79c0ff">✓ Reconciliation</text>
  <text x="60" y="308" class="s">A snapshot arrives: snap to the server's truth, then instantly replay the inputs it hadn't seen yet.</text>
  <text x="60" y="328" class="s">Inputs are acked by a counter the server echoes back — so exactly the un-acked ones get replayed.</text>
  <circle cx="470" cy="300" r="7" fill="#4da3ff"/>
  <path d="M470,300 C 540,300 560,300 600,300" stroke="#4da3ff" stroke-width="2" fill="none" marker-end="url(#tlArrow)"/>
  <text x="640" y="304" class="s" fill="#79c0ff">replay un-acked</text>

  <!-- Lane 3: remotes -->
  <rect x="40" y="364" width="820" height="92" rx="12" fill="#16231a" stroke="#3fb950" stroke-opacity="0.6"/>
  <text x="60" y="390" class="lane" fill="#56c96a">👥 Everyone else (remote players)</text>
  <text x="60" y="412" class="s">Not simulated on your device — just smoothly interpolated between buffered snapshots, ~66 ms behind.</text>
  <circle cx="150" cy="430" r="9" fill="#3fb950"/>
  <text x="150" y="448" class="s" text-anchor="middle" fill="#56c96a">rendered in the past</text>
  <line x1="170" y1="430" x2="450" y2="430" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="470" cy="430" r="4" fill="#3fb950" fill-opacity="0.4"/>
</svg>
